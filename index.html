<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكار | Qtaishat.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #010103;
    --indigo: #818cf8;
    --white: #ffffff;
    --glass-bg: rgba(255, 255, 255, 0.015);
    --glass-border: rgba(255, 255, 255, 0.08);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--white);
  }

  canvas { position: fixed; inset: 0; z-index: 0; display: block; }

  #site-name {
    position: fixed; top: 2rem; left: 2.5rem; z-index: 20;
    font-family: 'Cormorant Garamond', serif; font-size: 0.8rem;
    font-weight: 300; letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); direction: ltr;
  }

  #counter {
    position: fixed; top: 2rem; right: 2.5rem; z-index: 20;
    font-family: 'Cormorant Garamond', serif; font-size: 0.75rem;
    letter-spacing: 0.2em; color: rgba(255,255,255,0.3); direction: ltr;
  }

  #card {
    position: fixed; bottom: 8vh; left: 50%; transform: translateX(-50%);
    z-index: 10; width: min(680px, 92vw);
    cursor: pointer;
  }

  #card-inner {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 2.5rem 2.5rem 1.8rem;
    backdrop-filter: blur(30px) saturate(1.8);
    -webkit-backdrop-filter: blur(30px) saturate(1.8);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    transition: all 0.4s ease;
    position: relative;
  }

  #card:hover #card-inner { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.03); }

  #text-wrap { position: relative; min-height: 160px; }

  .azkar-slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; gap: 0.8rem;
    transition: opacity 0.8s ease, transform 0.8s ease;
    opacity: 0; transform: translateY(15px); pointer-events: none;
  }
  .azkar-slide.active { opacity: 1; transform: translateY(0); pointer-events: auto; position: relative; }
  .azkar-slide.exit { opacity: 0; transform: translateY(-15px); }

  .arabic {
    direction: rtl; font-family: 'Amiri', serif;
    font-size: clamp(1.9rem, 4.8vw, 3.1rem);
    font-weight: 700; line-height: 1.55; color: #fff;
    text-shadow: 0 0 30px rgba(129, 140, 248, 0.4), 0 4px 10px rgba(0,0,0,0.9);
  }

  .transliteration { font-size: 0.95rem; font-style: italic; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .english { font-size: 1.1rem; font-weight: 300; color: rgba(255,255,255,0.85); line-height: 1.6; }
  .source { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.2); margin-top: 0.5rem; }

  #card-footer { display: flex; align-items: center; gap: 1.2rem; margin-top: 1.8rem; }
  #progress-wrap { flex: 1; height: 1.5px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  #progress-bar { height: 100%; width: 100%; background: #fff; transform-origin: right; }
  #pause-btn { background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.3); transition: color 0.3s; }
  #pause-btn:hover { color: #fff; }

  #paused-pill {
    position: absolute; top: 1.2rem; right: 1.2rem;
    background: rgba(129, 140, 248, 0.2); border: 1px solid rgba(129, 140, 248, 0.4);
    border-radius: 20px; padding: 3px 12px; font-size: 0.6rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: #fff; opacity: 0; transition: opacity 0.3s;
  }

  #hint {
    position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
    font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.15); font-family: 'Cormorant Garamond', serif;
  }
</style>
</head>
<body>

<div id="site-name">Qtaishat.com</div>
<div id="counter"></div>
<canvas id="c"></canvas>

<div id="card">
  <div id="card-inner">
    <div id="paused-pill">paused</div>
    <div id="text-wrap"></div>
    <div id="card-footer">
      <div id="progress-wrap"><div id="progress-bar"></div></div>
      <button id="pause-btn" title="Pause / Play" onclick="event.stopPropagation()">
        <svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="3" height="16"/><rect x="15" y="4" width="3" height="16"/></svg>
        <svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="hint">tap card · space to advance · p to pause</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AZKAR DATA (Preserved)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AZKAR = [
  { arabic: "سُبْحَانَ اللهِ", transliteration: "Subhan Allah", english: "Glory be to God", source: "Sahih al-Bukhari" },
  { arabic: "الْحَمْدُ لِلَّهِ", transliteration: "Alhamdulillah", english: "All praise is due to God", source: "Quran 1:2" },
  { arabic: "اللهُ أَكْبَرُ", transliteration: "Allahu Akbar", english: "God is the Greatest", source: "Sahih al-Bukhari" },
  { arabic: "لَا إِلَهَ إِلَّا اللهُ", transliteration: "La ilaha illallah", english: "There is no god but God", source: "Sahih Muslim" },
  { arabic: "أَسْتَغْفِرُ اللهَ", transliteration: "Astaghfirullah", english: "I seek forgiveness from God", source: "Sahih al-Bukhari" },
  { arabic: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ", transliteration: "Bismillah ir-Rahman ir-Rahim", english: "In the name of God, the Most Gracious, the Most Merciful", source: "Quran 1:1" }
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// THREE.JS — HD DYNAMIC ORBIT JOURNEY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 2000);
// Starting position
camera.position.set(0, 0, 5); 

// --- HD NEBULA SHADER (Math-based, non-pixelated) ---
const nebulaShader = {
    uniforms: {
        uTime: { value: 0 },
        uRes: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
    },
    vertexShader: `
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
    `,
    fragmentShader: `
        precision highp float;
        uniform float uTime;
        uniform vec2 uRes;
        varying vec2 vUv;

        float hash(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }

        float noise(vec2 p) {
            vec2 i = floor(p); vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
                       mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x), f.y);
        }

        float fbm(vec2 p) {
            float v = 0.0; float a = 0.5;
            for (int i = 0; i < 7; i++) {
                v += a * noise(p); p *= 2.1; a *= 0.5;
            }
            return v;
        }

        void main() {
            vec2 uv = (vUv - 0.5) * (uRes / min(uRes.x, uRes.y));
            float t = uTime * 0.04;
            
            // Camera Zoom/Travel Simulation
            uv *= 0.8 - sin(t * 0.1) * 0.2;
            
            // Layered Colors (James Webb Cliffs palette)
            vec2 nUv = uv + vec2(t * 0.5, t * 0.2);
            float n1 = fbm(uv * 1.5 + fbm(nUv));
            float n2 = fbm(uv * 2.0 - t * 0.1);

            vec3 teal = vec3(0.0, 0.4, 0.4);
            vec3 orange = vec3(0.8, 0.4, 0.1);
            vec3 purple = vec3(0.3, 0.1, 0.5);

            vec3 color = mix(teal, purple, n1);
            color = mix(color, orange, n2 * 0.6);
            
            // Depth/Darkness
            float mask = smoothstep(1.2, 0.2, length(uv));
            color *= n1 * mask;
            
            // HD Stars baked into shader
            float stars = pow(hash(vUv), 500.0) * 1.5;
            color += stars;

            gl_FragColor = vec4(color, 1.0);
        }
    `
};

const nebulaMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.ShaderMaterial(nebulaShader));
scene.add(nebulaMesh);

// --- FLYING STAR SYSTEM ---
const starCount = 3000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
    starPos[i*3] = (Math.random() - 0.5) * 1500;
    starPos[i*3+1] = (Math.random() - 0.5) * 1500;
    starPos[i*3+2] = (Math.random() - 0.5) * 2000;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ size: 1.8, color: 0xffffff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AZKAR LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DURATION = 15000;
let queue = [], currentIdx = 0, startTime = null, paused = false, pausedAt = 0, currentEl = null;

function buildQueue() { queue = [...Array(AZKAR.length).keys()].sort(() => Math.random() - 0.5); }

function showAzkar(idx) {
    const z = AZKAR[queue[idx]];
    const old = currentEl;
    if (old) { 
        old.classList.remove('active'); 
        old.classList.add('exit'); 
        setTimeout(() => old.remove(), 800); 
    }
    const el = document.createElement('div');
    el.className = 'azkar-slide';
    el.innerHTML = `<div class="arabic">${z.arabic}</div><div class="divider"></div><div class="transliteration">${z.transliteration}</div><div class="english">${z.english}</div><div class="source">${z.source}</div>`;
    document.getElementById('text-wrap').appendChild(el);
    setTimeout(() => el.classList.add('active'), 50);
    currentEl = el;
    document.getElementById('counter').textContent = `${idx + 1} / ${queue.length}`;
}

function advance() { currentIdx = (currentIdx + 1) % queue.length; if(currentIdx === 0) buildQueue(); startTime = performance.now(); showAzkar(currentIdx); }

function setPaused(val) {
    paused = val;
    document.getElementById('paused-pill').style.opacity = paused ? '1' : '0';
    document.getElementById('icon-pause').style.display = paused ? 'none' : 'block';
    document.getElementById('icon-play').style.display = paused ? 'block' : 'none';
    if(paused) pausedAt = performance.now() - startTime; else startTime = performance.now() - pausedAt;
}

document.getElementById('card').addEventListener('click', () => { if(!paused) advance(); });
document.getElementById('pause-btn').addEventListener('click', e => { e.stopPropagation(); setPaused(!paused); });
document.addEventListener('keydown', e => { if(e.code === 'Space') advance(); if(e.code === 'KeyP') setPaused(!paused); });

buildQueue();
startTime = performance.now();
showAzkar(0);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ANIMATION LOOP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function animate(now) {
    requestAnimationFrame(animate);
    const t = now * 0.001;
    nebulaShader.uniforms.uTime.value = t;

    // 1. STAR FLY-THROUGH (Forward movement)
    const pos = stars.geometry.attributes.position.array;
    for (let i = 0; i < starCount; i++) {
        pos[i*3 + 2] += 1.5;
        if (pos[i*3 + 2] > 500) pos[i*3 + 2] = -1500;
    }
    stars.geometry.attributes.position.needsUpdate = true;

    // 2. DYNAMIC CAMERA MOVEMENT (Fly-through + Orbit)
    if (!paused) {
        // Slow orbit (yaw) around the central axis
        stars.rotation.y = Math.sin(t * 0.05) * 0.1;
        stars.rotation.x = Math.cos(t * 0.03) * 0.05;

        // Dynamic forward speed modulation (slow Majestic drift)
        // Adjusting camera Z for "flying through" feeling
        camera.position.z = 5 + Math.sin(t * 0.1) * 2;
        
        // Parallax drift based on movement
        camera.position.x = Math.sin(t * 0.12) * 8;
        camera.position.y = Math.cos(t * 0.1) * 4;
        
        // Fixed lookAt creates the orbit feeling
        camera.lookAt(0, 0, -1200); 

        // Progress bar
        const p = Math.min((performance.now() - startTime) / DURATION, 1);
        document.getElementById('progress-bar').style.transform = `scaleX(${1 - p})`;
        if (p >= 1) advance();
    }
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    nebulaShader.uniforms.uRes.value.set(window.innerWidth, window.innerHeight);
});

animate(0);
</script>
</body>
</html>
