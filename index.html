<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكار — Qtaishat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #010105;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #fff;
  }
  canvas { position: fixed; inset: 0; z-index: 0; display: block; }

  /* Top Navigation */
  #site-name {
    position: fixed; top: 2rem; left: 2.5rem; z-index: 20;
    font-size: 0.75rem; font-weight: 300; letter-spacing: 0.4em; 
    text-transform: uppercase; color: rgba(255,255,255,0.2); direction: ltr;
  }
  #counter {
    position: fixed; top: 2rem; right: 2.5rem; z-index: 20;
    font-size: 0.72rem; letter-spacing: 0.25em; color: rgba(255,255,255,0.18); direction: ltr;
  }

  /* Centered Branding at Bottom */
  #branding-footer {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    z-index: 20; display: flex; align-items: center; gap: 1rem;
    font-size: 1.1rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.4);
    font-weight: 300; pointer-events: none;
  }
  #branding-footer span { font-family: 'Amiri', serif; }

  /* Main Card Logic */
  #card {
    position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
    z-index: 10; width: min(700px, 90vw); text-align: center;
  }

  #text-wrap { position: relative; min-height: 200px; display: flex; align-items: center; justify-content: center; }

  .azkar-slide {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1rem;
    transition: opacity 1.2s ease, transform 1.2s ease; opacity: 0; transform: translateY(15px);
  }
  .azkar-slide.active { opacity: 1; transform: translateY(0); position: relative; }

  .arabic {
    font-family: 'Amiri', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700;
    text-shadow: 0 0 15px rgba(255,255,255,0.5), 0 0 40px rgba(100,80,255,0.3);
  }
  .transliteration { font-style: italic; color: rgba(200,210,255,0.7); font-size: 0.95rem; }
  .english { font-size: 1.1rem; color: rgba(255,255,255,0.85); max-width: 80%; }

  /* Progress Bar */
  #progress-container {
    position: fixed; bottom: 6rem; left: 50%; transform: translateX(-50%);
    width: 200px; height: 1px; background: rgba(255,255,255,0.1); z-index: 20;
  }
  #progress-bar { height: 100%; width: 100%; background: #fff; transform-origin: left; transition: transform 0.1s linear; }

  #hint {
    position: fixed; bottom: 4.5rem; left: 50%; transform: translateX(-50%);
    font-size: 0.5rem; letter-spacing: 0.3em; color: rgba(255,255,255,0.15); text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="site-name">Besm Allah</div>
<div id="counter"></div>
<canvas id="c"></canvas>

<div id="card">
  <div id="text-wrap"></div>
</div>

<div id="progress-container"><div id="progress-bar"></div></div>

<div id="branding-footer">
    <span>قطيشات</span>
    <div style="width: 1px; height: 15px; background: rgba(255,255,255,0.2);"></div>
    <div>Qtaishat</div>
</div>

<div id="hint">tap to advance · p to pause</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AZKAR DATA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AZKAR = [
  { arabic: "سُبْحَانَ اللهِ", transliteration: "Subhan Allah", english: "Glory be to God" },
  { arabic: "الْحَمْدُ لِلَّهِ", transliteration: "Alhamdulillah", english: "All praise is due to God" },
  { arabic: "اللهُ أَكْبَرُ", transliteration: "Allahu Akbar", english: "God is the Greatest" },
  { arabic: "لَا إِلَهَ إِلَّا اللهُ", transliteration: "La ilaha illallah", english: "There is no god but God" },
  { arabic: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ", transliteration: "Bismillah ir-Rahman ir-Rahim", english: "In the name of God, the Most Gracious, the Most Merciful" }
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// THREE.JS — MILKY WAY NEBULA SHADER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.Camera(); // Orthographic for full-screen shader

const nebulaMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uRes: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
  },
  vertexShader: `void main() { gl_Position = vec4(position, 1.0); }`,
  fragmentShader: `
    precision highp float;
    uniform float uTime;
    uniform vec2 uRes;

    float hash(vec2 p) {
        p = fract(p * vec2(123.34, 456.21));
        p += dot(p, p + 45.32);
        return fract(p.x * p.y);
    }

    float noise(vec2 p) {
        vec2 i = floor(p); vec2 f = fract(p);
        f = f*f*(3.0-2.0*f);
        return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
                   mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
    }

    float fbm(vec2 p) {
        float v = 0.0, a = 0.5;
        for(int i=0; i<6; i++) { v += a * noise(p); p *= 2.0; a *= 0.5; }
        return v;
    }

    void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * uRes.xy) / min(uRes.y, uRes.x);
        float t = uTime * 0.015;

        // Rotation
        float s = sin(t), c = cos(t);
        uv *= mat2(c, -s, s, c);

        float r = length(uv);
        float angle = atan(uv.y, uv.x);

        // Spiral Arms with realistic "Dust Lane" gaps
        float spiral = sin(angle * 2.0 - r * 6.0 + fbm(uv * 3.0) * 2.0);
        float nebula = fbm(uv * 2.0 + fbm(uv * 4.0 + t));
        
        // Colors: Milky Way Palette (Deep Blue, Violet, Golden Core)
        vec3 coreCol = vec3(1.0, 0.8, 0.6) * smoothstep(0.4, 0.0, r); // Golden center
        vec3 armCol = vec3(0.2, 0.1, 0.5) * spiral; // Purple arms
        vec3 dustCol = vec3(0.05, 0.02, 0.1) * nebula; // Dark space dust

        // Combine
        vec3 finalCol = coreCol + armCol * nebula + dustCol;
        
        // Add Star Grains
        float stars = pow(hash(uv + t*0.00001), 500.0) * 2.0;
        finalCol += stars * smoothstep(0.8, 0.2, r);

        gl_FragColor = vec4(finalCol, 1.0);
    }
  `
});

const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), nebulaMat);
scene.add(quad);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NAVIGATION & UI LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DURATION = 10000;
let currentIdx = 0;
let startTime = Date.now();
let paused = false;

function showAzkar(idx) {
  const wrap = document.getElementById('text-wrap');
  wrap.innerHTML = '';
  const z = AZKAR[idx];
  const slide = document.createElement('div');
  slide.className = 'azkar-slide active';
  slide.innerHTML = `
    <div class="arabic">${z.arabic}</div>
    <div class="transliteration">${z.transliteration}</div>
    <div class="english">${z.english}</div>
  `;
  wrap.appendChild(slide);
  document.getElementById('counter').textContent = `${idx + 1} / ${AZKAR.length}`;
}

function next() {
  currentIdx = (currentIdx + 1) % AZKAR.length;
  startTime = Date.now();
  showAzkar(currentIdx);
}

window.addEventListener('click', () => { if(!paused) next(); });
window.addEventListener('keydown', (e) => {
  if(e.code === 'Space') next();
  if(e.code === 'KeyP') paused = !paused;
});

// Render Loop
function animate() {
  requestAnimationFrame(animate);
  const now = Date.now();
  nebulaMat.uniforms.uTime.value = now * 0.001;

  if (!paused) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / DURATION, 1);
    document.getElementById('progress-bar').style.transform = `scaleX(${1 - progress})`;
    if (progress >= 1) next();
  }

  renderer.render(scene, camera);
}

// Init
showAzkar(0);
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  nebulaMat.uniforms.uRes.value.set(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
