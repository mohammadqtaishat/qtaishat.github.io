---
layout: null
---
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qtaishat</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            color: white;
            font-family: 'Amiri', serif
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content-overlay {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 40px 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin: 0;
            opacity: 0.9;
        }

        .athkar-wrap {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #athkar-text {
            font-size: 1.8rem;
            min-height: 3rem;
            transition: opacity 1.5s ease-in-out;
            max-width: 800px;
            line-height: 1.6;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        footer {
            font-size: 1.2rem;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .brand-split {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="content-overlay">
        <header>
            <h1>بسم الله الرحمن الرحيم</h1>
        </header>

        <div class="athkar-wrap">
            <div id="athkar-text">سبحان الله وبحمده</div>
        </div>

        <footer>
            <div class="brand-split">
                <span>قطيشات</span>
                <span>/</span>
                <span>Qtaishat</span>
            </div>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // --- ATHKAR LOGIC ---
        const athkar = [
            "سبحان الله وبحمده",
            "سبحان الله العظيم",
            "لا إله إلا الله وحده لا شريك له",
            "الحمد لله رب العالمين",
            "أستغفر الله وأتوب إليه",
            "اللهم صل وسلم على نبينا محمد"
        ];
        let index = 0;
        const textElement = document.getElementById('athkar-text');

        setInterval(() => {
            textElement.style.opacity = 0;
            setTimeout(() => {
                index = (index + 1) % athkar.length;
                textElement.innerText = athkar[index];
                textElement.style.opacity = 1;
            }, 1500);
        }, 6000);

        // --- THREE.JS SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Create Particle Stars
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 5000;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 10;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({
            size: 0.005,
            color: 0xffffff,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh);

        camera.position.z = 3;

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.001;
            particlesMesh.rotation.x += 0.0005;
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
