<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكار — Qtaishat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #010105; /* Deeper space background */
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #fff;
    cursor: default;
  }
  canvas { position: fixed; inset: 0; z-index: 0; display: block; }

  #site-name {
    position: fixed; top: 2rem; left: 2.5rem; z-index: 20;
    font-family: 'Cormorant Garamond', serif; font-size: 0.75rem;
    font-weight: 300; letter-spacing: 0.5em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); direction: ltr;
  }
  #counter {
    position: fixed; top: 2rem; right: 2.5rem; z-index: 20;
    font-family: 'Cormorant Garamond', serif; font-size: 0.72rem;
    letter-spacing: 0.25em; color: rgba(255,255,255,0.3); direction: ltr;
  }

  /* Text Card */
  #card {
    position: fixed; bottom: 12vh; left: 50%; transform: translateX(-50%);
    z-index: 10; width: min(700px, 90vw);
    text-align: center; cursor: pointer;
    background: radial-gradient(circle, rgba(20, 10, 40, 0.4) 0%, rgba(0,0,0,0) 70%); /* Subtle central glow */
    border-radius: 20px;
    padding: 2rem;
  }

  #text-wrap { position: relative; min-height: 220px; display: flex; align-items: center; justify-content: center; }

  .azkar-slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0.8rem;
    transition: opacity 1.2s ease, transform 1.2s ease;
    opacity: 0; transform: translateY(20px); pointer-events: none;
  }
  .azkar-slide.active { opacity: 1; transform: translateY(0); pointer-events: auto; position: relative; }
  .azkar-slide.exit { opacity: 0; transform: translateY(-20px); }

  .arabic {
    font-family: 'Amiri', serif; font-size: clamp(2.2rem, 6vw, 3.8rem);
    font-weight: 700; line-height: 1.6; color: #fff;
    text-shadow: 0 0 25px rgba(255,255,255,0.5), 0 0 50px rgba(180,150,255,0.4);
  }
  .divider { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, #fff, transparent); margin: 0.8rem auto; opacity: 0.3; }
  .transliteration { font-size: 1.1rem; font-style: italic; color: #dcdcfe; letter-spacing: 0.05em; }
  .english { font-size: 1.3rem; font-weight: 300; color: #f0f0ff; line-height: 1.6; max-width: 90%; margin: 0 auto; }
  .source { font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-top: 1.5rem; }

  #card-footer { display: flex; align-items: center; gap: 1.5rem; margin-top: 3.5rem; padding: 0 1rem; }
  #progress-wrap { flex: 1; height: 1px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
  #progress-bar { height: 100%; width: 100%; transform-origin: right; background: #fff; box-shadow: 0 0 10px #fff; }
  #pause-btn { background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.5); }

  #paused-pill {
    position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 5;
    font-size: 0.8rem; letter-spacing: 0.8em; text-transform: uppercase;
    color: rgba(255,255,255,0.3); opacity: 0; transition: opacity 0.5s;
  }
</style>
</head>
<body>

<div id="site-name">Qtaishat</div>
<div id="counter"></div>
<canvas id="c"></canvas>

<div id="card">
  <div id="text-wrap"></div>
  <div id="card-footer">
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <button id="pause-btn" onclick="event.stopPropagation()"><svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="3" height="16" /><rect x="15" y="4" width="3" height="16" /></svg><svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M8 5v14l11-7z"/></svg></button>
  </div>
</div>
<div id="paused-pill">Paused</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AZKAR DATA (Preserved from original)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AZKAR = [
  { arabic: "سُبْحَانَ اللهِ", transliteration: "Subhan Allah", english: "Glory be to God", source: "Sahih al-Bukhari" },
  { arabic: "الْحَمْدُ لِلَّهِ", transliteration: "Alhamdulillah", english: "All praise is due to God", source: "Quran 1:2" },
  { arabic: "اللهُ أَكْبَرُ", transliteration: "Allahu Akbar", english: "God is the Greatest", source: "Sahih al-Bukhari" },
  { arabic: "لَا إِلَهَ إِلَّا اللهُ", transliteration: "La ilaha illallah", english: "There is no god but God", source: "Sahih Muslim" },
  { arabic: "أَسْتَغْفِرُ اللهَ", transliteration: "Astaghfirullah", english: "I seek forgiveness from God", source: "Sahih al-Bukhari" },
  { arabic: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ", transliteration: "Bismillah ir-Rahman ir-Rahim", english: "In the name of God, the Most Gracious, the Most Merciful", source: "Quran 1:1" }
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// THREE.JS — COLORFUL SPACE JOURNEY
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1500);
camera.position.z = 5;

// Function to generate colorful glowing particle textures
function createColorfulCircleTexture(color1, color2, size = 128) {
    const matCanvas = document.createElement('canvas');
    matCanvas.width = size; matCanvas.height = size;
    const ctx = matCanvas.getContext('2d');
    const center = size / 2;
    const gradient = ctx.createRadialGradient(center, center, 0, center, center, center);
    gradient.addColorStop(0, color1);
    gradient.addColorStop(0.3, color2);
    gradient.addColorStop(0.6, 'rgba(0, 0, 0, 0.1)'); // Very soft edge
    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, size, size);
    return new THREE.CanvasTexture(matCanvas);
}

// 1. STAR LAYER (The "Fly-Through" Points)
const starCount = 6000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
const starColors = new Float32Array(starCount * 3);

// Star color palette (blues, purples, whites)
const starPalette = [
    new THREE.Color(0xffffff), // White
    new THREE.Color(0xccccff), // Light Blue
    new THREE.Color(0xe0bbff)  // Light Purple
];

for (let i = 0; i < starCount; i++) {
    // 3D position
    starPos[i*3] = (Math.random() - 0.5) * 1200; // X
    starPos[i*3+1] = (Math.random() - 0.5) * 1200; // Y
    starPos[i*3+2] = Math.random() * 1200; // Z

    // Choose a color
    const c = starPalette[Math.floor(Math.random() * starPalette.length)];
    starColors[i*3] = c.r;
    starColors[i*3+1] = c.g;
    starColors[i*3+2] = c.b;
}

starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

const starMat = new THREE.PointsMaterial({
    size: 2.2, sizeAttenuation: true, transparent: true, opacity: 1,
    vertexColors: true, // Use generated colors
    map: createColorfulCircleTexture('rgba(255, 255, 255, 1)', 'rgba(200, 200, 255, 0.5)'), 
    blending: THREE.AdditiveBlending
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// 2. COLORFUL NEBULA CLOUDS (Gaseous gaseous blobs)
const nebulaGroup = new THREE.Group();
scene.add(nebulaGroup);
const nebulaCount = 60; // More nebulae for more color
const nebulaColors = [
    ['#3a1a6b', '#221155'], // Deep Purple
    ['#1a4b8c', '#112255'], // Deep Blue
    ['#5a2b8c', '#330055'], // Magenta/Violet
    ['#8c6b3a', '#554422']  // Faint Gold/Rust
];

for (let i = 0; i < nebulaCount; i++) {
    const palette = nebulaColors[i % nebulaColors.length];
    const tex = createColorfulCircleTexture(palette[0], palette[1], 256);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.22, blending: THREE.AdditiveBlending });
    const sprite = new THREE.Sprite(mat);
    
    // Distribute further and deeper
    sprite.position.set((Math.random()-0.5)*1400, (Math.random()-0.5)*1400, Math.random()*1200);
    sprite.scale.set(400, 400, 1);
    nebulaGroup.add(sprite);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AZKAR LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DURATION = 12000;
let currentIdx = 0, startTime = Date.now(), paused = false, pausedAt = 0, currentEl = null;

function showAzkar(idx) {
    const z = AZKAR[idx];
    const old = currentEl;
    if (old) { old.classList.remove('active'); old.classList.add('exit'); setTimeout(() => old.remove(), 1200); }
    const el = document.createElement('div');
    el.className = 'azkar-slide';
    el.innerHTML = `<div class="arabic">${z.arabic}</div><div class="divider"></div><div class="transliteration">${z.transliteration}</div><div class="english">${z.english}</div><div class="source">${z.source}</div>`;
    document.getElementById('text-wrap').appendChild(el);
    setTimeout(() => el.classList.add('active'), 50);
    currentEl = el;
    document.getElementById('counter').textContent = `${idx + 1} / ${AZKAR.length}`;
}

function advance() { currentIdx = (currentIdx + 1) % AZKAR.length; startTime = Date.now(); showAzkar(currentIdx); }

function togglePause() {
    paused = !paused;
    const pill = document.getElementById('paused-pill');
    if (paused) {
        pausedAt = Date.now() - startTime;
        document.getElementById('icon-pause').style.display = 'none';
        document.getElementById('icon-play').style.display = 'block';
        pill.style.opacity = '1';
    } else {
        startTime = Date.now() - pausedAt;
        document.getElementById('icon-pause').style.display = 'block';
        document.getElementById('icon-play').style.display = 'none';
        pill.style.opacity = '0';
    }
}

document.getElementById('card').addEventListener('click', () => { if(!paused) advance(); });
showAzkar(0);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ANIMATION LOOP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function animate() {
    requestAnimationFrame(animate);
    const now = Date.now();

    // 1. Star Fly-through movement (Toward camera)
    const starArr = stars.geometry.attributes.position.array;
    for (let i = 0; i < starCount; i++) {
        starArr[i*3 + 2] -= 1.0; // Speed (Forward movement)
        if (starArr[i*3 + 2] < 0) {
            // Respawn at back
            starArr[i*3 + 2] = 1200;
            starArr[i*3] = (Math.random() - 0.5) * 1200;
            starArr[i*3+1] = (Math.random() - 0.5) * 1200;
        }
    }
    stars.geometry.attributes.position.needsUpdate = true;

    // 2. Colorful Nebula movement (Deeper journey)
    nebulaGroup.children.forEach((cloud, index) => {
        cloud.position.z -= 0.5; // Slower forward movement for deep nebulae
        if (cloud.position.z < -200) cloud.position.z = 1200;
        
        // Very subtle drift rotation
        cloud.material.rotation += (index % 2 === 0 ? 0.0001 : -0.0001);
    });

    // Subtlest drift to entire group for depth
    nebulaGroup.rotation.z += 0.0001;
    stars.rotation.z += 0.0001;

    // 3. Progress Bar Logic
    if (!paused) {
        const elapsed = now - startTime;
        const p = Math.max(0, 1 - (elapsed / DURATION));
        document.getElementById('progress-bar').style.transform = `scaleX(${p})`;
        if (elapsed >= DURATION) advance();
    }
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
