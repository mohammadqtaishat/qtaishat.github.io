// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// THREE.JS — HEAVENLY NEBULA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x02020d, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.z = 1;

// ─── FULL-SCREEN NEBULA SHADER ───────────────────────────────────────────────
// Rendered as a screen-space quad — no projection needed.
const nebulaMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uRes:  { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position.xy * 2.0 - 1.0, 0.0, 1.0); }
  `,
  fragmentShader: `
    precision mediump float;
    uniform float uTime;
    uniform vec2  uRes;
    varying vec2  vUv;

    // ── Noise ──────────────────────────────────────────────────────────────
    float hash21(vec2 p) {
      p = fract(p * vec2(234.34, 435.345));
      p += dot(p, p + 34.23);
      return fract(p.x * p.y);
    }

    float vnoise(vec2 p) {
      vec2 i = floor(p), f = fract(p);
      f = f*f*(3.0 - 2.0*f);
      return mix(
        mix(hash21(i), hash21(i+vec2(1,0)), f.x),
        mix(hash21(i+vec2(0,1)), hash21(i+vec2(1,1)), f.x),
        f.y
      );
    }

    float fbm(vec2 p, int oct) {
      float v=0.,a=.55,fr=1.;
      for(int i=0;i<8;i++){
        if(i>=oct) break;
        v+=a*vnoise(p*fr); fr*=2.13; a*=.46;
      }
      return v;
    }

    // ── Spiral arm: returns density for a given arm angle ──────────────────
    float spiralArm(vec2 uv, float offset, float tightness, float width) {
      float r = length(uv);
      float a = atan(uv.y, uv.x) + offset - r * tightness;
      a = mod(a + 3.14159, 6.28318) - 3.14159;
      float fade = smoothstep(0.0, 0.15, r) * smoothstep(1.4, 0.4, r);
      return smoothstep(width, 0.0, abs(a)) * fade;
    }

    void main() {
      vec2 uv = vUv - 0.5;
      uv.x *= uRes.x / uRes.y;

      float t = uTime * 0.028;   // very slow rotation speed

      // Rotate entire UV
      float c = cos(t), s = sin(t);
      vec2 ruv = vec2(uv.x*c - uv.y*s, uv.x*s + uv.y*c);

      // ── 1. Spiral galaxy arms ──────────────────────────────────────────
      // 3 pairs of opposite arms, slightly different tightness
      float arms = 0.0;
      arms += spiralArm(ruv, 0.00,  2.2, 1.0);
      arms += spiralArm(ruv, 3.14,  2.2, 1.0);
      arms += spiralArm(ruv, 1.05,  1.8, 0.85) * 0.7;
      arms += spiralArm(ruv, 4.19,  1.8, 0.85) * 0.7;
      arms += spiralArm(ruv, 2.09,  2.5, 0.7)  * 0.4;
      arms += spiralArm(ruv, 5.24,  2.5, 0.7)  * 0.4;
      arms = clamp(arms, 0.0, 1.0);

      // ── 2. Turbulent nebula clouds (domain-warped FBM) ─────────────────
      vec2 wp = ruv * 1.6;
      float wx = fbm(wp + vec2(t * 0.22, 0.0), 4);
      float wy = fbm(wp + vec2(0.0, t * 0.18), 4);
      wp += vec2(wx, wy) * 0.55;
      float cloud = fbm(wp, 6);

      // ── 3. Radial core glow ────────────────────────────────────────────
      float r = length(ruv);
      float core     = smoothstep(0.60, 0.0, r);
      float innerCore = smoothstep(0.14, 0.0, r);

      // ── 4. Wisps / filaments at mid-radius ────────────────────────────
      vec2 wispUv = ruv * 1.1;
      wispUv.x += sin(t * 0.5 + wispUv.y * 4.5) * 0.09;
      wispUv.y += cos(t * 0.4 + wispUv.x * 3.5) * 0.07;
      float wisps = fbm(wispUv * 2.8 + t * 0.07, 5);
      float wispMask = smoothstep(0.08, 0.5, r) * smoothstep(1.2, 0.5, r);
      wisps *= wispMask;

      // ── Color mixing ───────────────────────────────────────────────────
      // Each element has its own color bias:
      vec3 colArm   = mix(vec3(0.04,0.02,0.22), vec3(0.35,0.12,0.75), arms);
      vec3 colCloud = mix(vec3(0.01,0.01,0.09), vec3(0.18,0.06,0.50), cloud);
      vec3 colWisp  = mix(vec3(0.03,0.02,0.15), vec3(0.50,0.20,0.65), wisps);
      // Core: warm pearl fading from violet to near-white
      vec3 colCore  = mix(vec3(0.12,0.06,0.40), vec3(0.80,0.75,1.00), core);
      vec3 colInner = vec3(0.96, 0.94, 1.00);

      // Outer halo ring — a faint auroral teal rim
      float halo = smoothstep(0.85,0.65,r) * smoothstep(0.40,0.60,r);
      vec3 colHalo = vec3(0.05, 0.25, 0.45) * halo * 0.5;

      // Assemble
      vec3 col = vec3(0.0);
      col += colArm   * arms   * 1.1;
      col += colCloud * cloud  * 0.75;
      col += colWisp  * wisps  * 0.55;
      col += colCore  * core   * 1.0;
      col += colInner * innerCore * 0.70;
      col += colHalo;

      // ── Secondary offset galaxy (gives sense of depth / distance) ─────
      vec2 g2 = ruv - vec2(0.30, -0.12);
      float g2arm = spiralArm(g2 * 1.3, 0.6, 2.0, 1.2) * 0.45;
      float g2cloud = fbm(g2 * 1.9 + t * 0.05, 5) * 0.25;
      col += vec3(0.06,0.10,0.38) * g2arm;
      col += vec3(0.04,0.06,0.28) * g2cloud;

      // ── Vignette: deep space at edges ─────────────────────────────────
      float vig = 1.0 - smoothstep(0.28, 1.1, length(uv) * 1.6);
      col *= vig;

      // ── Micro star glints baked into shader ───────────────────────────
      // Different grid scales for layered star fields
      float s1 = hash21(floor(ruv * 260.0 + 0.5));
      float s2 = hash21(floor(ruv * 480.0 + 0.5));
      float s3 = hash21(floor(ruv * 110.0 + 0.5));
      float twinkle1 = smoothstep(0.986, 1.0, s1) * (0.5 + 0.5*sin(uTime*(1.2 + s1*9.0)));
      float twinkle2 = smoothstep(0.990, 1.0, s2) * (0.5 + 0.5*sin(uTime*(0.8 + s2*6.0)));
      float twinkle3 = smoothstep(0.978, 1.0, s3) * (0.4 + 0.6*sin(uTime*(1.8 + s3*12.0))) * 0.5;
      col += twinkle1 * vec3(0.90, 0.92, 1.00) * 0.9;
      col += twinkle2 * vec3(0.88, 0.90, 1.00) * 0.7;
      col += twinkle3 * vec3(0.95, 0.96, 1.00) * 0.5;

      // ── Tone map + gamma ──────────────────────────────────────────────
      col = col / (col + 0.55);
      col = pow(max(col, 0.0), vec3(0.72));

      gl_FragColor = vec4(col, 1.0);
    }
  `,
  depthTest: false,
  depthWrite: false,
});

// Screen quad — bypass projection matrix entirely
const quad = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), nebulaMat);
quad.frustumCulled = false;
scene.add(quad);

// ── A few large soft foreground dust particles for 3-D depth feel ──────────
const dustCount = 80;
const dGeo = new THREE.BufferGeometry();
const dPos = new Float32Array(dustCount * 3);
const dCol = new Float32Array(dustCount * 3);
const dSz  = new Float32Array(dustCount);
const dPh  = new Float32Array(dustCount);
const DCOLS = [[0.38,0.18,0.80],[0.18,0.10,0.55],[0.55,0.20,0.72],[0.10,0.18,0.70],[0.65,0.28,0.88]];
for (let i = 0; i < dustCount; i++) {
  const i3 = i*3;
  dPos[i3]   = (Math.random()-0.5)*220;
  dPos[i3+1] = (Math.random()-0.5)*150;
  dPos[i3+2] = (Math.random()-0.5)*60 + 20;
  const dc = DCOLS[Math.floor(Math.random()*DCOLS.length)];
  dCol[i3]=dc[0]; dCol[i3+1]=dc[1]; dCol[i3+2]=dc[2];
  dSz[i] = 20 + Math.random()*60;
  dPh[i] = Math.random()*6.28;
}
dGeo.setAttribute('position', new THREE.BufferAttribute(dPos,3));
dGeo.setAttribute('color',    new THREE.BufferAttribute(dCol,3));
dGeo.setAttribute('sz',       new THREE.BufferAttribute(dSz,1));
dGeo.setAttribute('phase',    new THREE.BufferAttribute(dPh,1));

const dMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float sz; attribute vec3 color; attribute float phase;
    uniform float uTime; varying vec3 vC; varying float vA;
    void main() {
      vC = color;
      vA = 0.05 + 0.03*sin(uTime*0.4 + phase);
      gl_PointSize = sz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vC; varying float vA;
    void main() {
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if(d > 0.5) discard;
      gl_FragColor = vec4(vC, vA * smoothstep(0.5,0.0,d));
    }
  `,
  transparent:true, depthWrite:false, vertexColors:true,
});
const dust = new THREE.Points(dGeo, dMat);
scene.add(dust);

// ── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  nebulaMat.uniforms.uRes.value.set(window.innerWidth, window.innerHeight);
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AZKAR LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DURATION = 15000;
let queue=[], currentIdx=0, startTime=null, paused=false, pausedAt=0, currentEl=null;

const wrap        = document.getElementById('text-wrap');
const bar         = document.getElementById('progress-bar');
const counterEl   = document.getElementById('counter');
const pauseBtn    = document.getElementById('pause-btn');
const iconPause   = document.getElementById('icon-pause');
const iconPlay    = document.getElementById('icon-play');
const pausedPill  = document.getElementById('paused-pill');

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildQueue(){ queue=shuffle([...Array(AZKAR.length).keys()]); }

function createSlide(z){
  const d=document.createElement('div');
  d.className='azkar-slide';
  d.innerHTML=`<div class="arabic">${z.arabic}</div><div class="divider"></div><div class="transliteration">${z.transliteration}</div><div class="english">${z.english}</div><div class="source">${z.source}</div>`;
  return d;
}

function showAzkar(idx){
  const z=AZKAR[queue[idx]];
  const old=currentEl;
  if(old){ old.classList.remove('active'); old.classList.add('exit'); setTimeout(()=>old.remove(),950); }
  const el=createSlide(z); wrap.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('active')));
  currentEl=el;
  counterEl.textContent=`${idx+1} / ${queue.length}`;
}

function advance(){
  currentIdx=(currentIdx+1)%queue.length;
  if(currentIdx===0) buildQueue();
  startTime=performance.now();
  showAzkar(currentIdx);
}

function setPaused(val){
  paused=val;
  if(paused){
    pausedAt=performance.now()-startTime;
    iconPause.style.display='none'; iconPlay.style.display='';
    pausedPill.style.opacity='1';
  } else {
    startTime=performance.now()-pausedAt;
    iconPause.style.display=''; iconPlay.style.display='none';
    pausedPill.style.opacity='0';
  }
}

document.getElementById('card').addEventListener('click',()=>{ if(!paused) advance(); });
pauseBtn.addEventListener('click',e=>{ e.stopPropagation(); setPaused(!paused); });
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){ e.preventDefault(); if(!paused) advance(); }
  if(e.code==='KeyP') setPaused(!paused);
});

buildQueue(); startTime=performance.now(); showAzkar(0);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER LOOP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function tick(now){
  requestAnimationFrame(tick);
  const t = now * 0.001;
  nebulaMat.uniforms.uTime.value = t;
  dMat.uniforms.uTime.value = t;

  // Very slow camera wobble — gives the nebula a parallax breathing quality
  camera.position.x = Math.sin(t * 0.018) * 0.08;
  camera.position.y = Math.cos(t * 0.013) * 0.05;
  camera.lookAt(0, 0, 0);

  // Dust particles gently rotate (adds slow approaching sensation)
  dust.rotation.z = t * 0.006;
  dust.position.z = Math.sin(t * 0.04) * 2;

  if(!paused && startTime!==null){
    const p = Math.min((now - startTime)/DURATION, 1);
    bar.style.transform = `scaleX(${1-p})`;
    if(p>=1) advance();
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
