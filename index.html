<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكار — Qtaishat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #05050a;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #fff;
    cursor: default;
  }
  canvas { position: fixed; inset: 0; z-index: 0; display: block; }

  #site-name {
    position: fixed; top: 2rem; left: 2.5rem; z-index: 20;
    font-family: 'Cormorant Garamond', serif; font-size: 0.75rem;
    font-weight: 300; letter-spacing: 0.5em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); direction: ltr;
  }
  #counter {
    position: fixed; top: 2rem; right: 2.5rem; z-index: 20;
    font-family: 'Cormorant Garamond', serif; font-size: 0.72rem;
    letter-spacing: 0.25em; color: rgba(255,255,255,0.3); direction: ltr;
  }

  #card {
    position: fixed; bottom: 10vh; left: 50%; transform: translateX(-50%);
    z-index: 10; width: min(700px, 90vw);
    pointer-events: auto; cursor: pointer; user-select: none; text-align: center;
  }

  #text-wrap {
    position: relative; min-height: 200px;
    display: flex; align-items: center; justify-content: center;
  }

  .azkar-slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0.8rem;
    transition: opacity 1.2s ease, transform 1.2s ease;
    opacity: 0; transform: translateY(20px); pointer-events: none;
  }
  .azkar-slide.active {
    opacity: 1; transform: translateY(0);
    pointer-events: auto; position: relative;
  }
  .azkar-slide.exit { opacity: 0; transform: translateY(-20px); }

  .arabic {
    direction: rtl; text-align: center;
    font-family: 'Amiri', serif;
    font-size: clamp(2rem, 5.5vw, 3.4rem);
    font-weight: 700; line-height: 1.6; color: #fff;
    text-shadow: 0 0 15px rgba(255,255,255,0.6), 0 0 30px rgba(130,100,255,0.4);
  }
  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    margin: 0.5rem auto;
  }
  .transliteration {
    direction: ltr; font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; font-style: italic;
    color: rgba(210,210,255,0.9); letter-spacing: 0.05em;
  }
  .english {
    direction: ltr; font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem; font-weight: 300; color: rgba(255,255,255,0.95);
    letter-spacing: 0.02em; line-height: 1.6;
    max-width: 90%; margin: 0 auto;
  }
  .source {
    direction: ltr; font-family: 'Cormorant Garamond', serif;
    font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(255,255,255,0.3); margin-top: 1.2rem;
  }

  #card-footer {
    display: flex; align-items: center; gap: 1.5rem;
    margin-top: 3rem; padding: 0 1rem;
  }
  #progress-wrap {
    flex: 1; height: 1px;
    background: rgba(255,255,255,0.1); position: relative;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 100%; transform-origin: right;
    background: #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
  }
  #pause-btn {
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.4); transition: color 0.3s;
  }
  #pause-btn:hover { color: #fff; }

  #paused-pill {
    position: fixed; top: 40%; left: 50%;
    transform: translate(-50%, -50%); z-index: 5;
    font-size: 0.75rem; letter-spacing: 0.6em; text-transform: uppercase;
    color: rgba(255,255,255,0.25); opacity: 0; transition: opacity 0.5s;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="site-name">Qtaishat</div>
<div id="counter"></div>
<canvas id="c"></canvas>

<div id="card">
  <div id="text-wrap"></div>
  <div id="card-footer">
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <button id="pause-btn" title="Pause / Play" onclick="event.stopPropagation()">
      <svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="4" width="3" height="16" /><rect x="15" y="4" width="3" height="16" />
      </svg>
      <svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
  </div>
</div>

<div id="paused-pill">Paused</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AZKAR DATA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AZKAR = [
  { arabic: "سُبْحَانَ اللهِ", transliteration: "Subhan Allah", english: "Glory be to God", source: "Sahih al-Bukhari" },
  { arabic: "الْحَمْدُ لِلَّهِ", transliteration: "Alhamdulillah", english: "All praise is due to God", source: "Quran 1:2" },
  { arabic: "اللهُ أَكْبَرُ", transliteration: "Allahu Akbar", english: "God is the Greatest", source: "Sahih al-Bukhari" },
  { arabic: "لَا إِلَهَ إِلَّا اللهُ", transliteration: "La ilaha illallah", english: "There is no god but God", source: "Sahih Muslim" },
  { arabic: "أَسْتَغْفِرُ اللهَ", transliteration: "Astaghfirullah", english: "I seek forgiveness from God", source: "Sahih al-Bukhari" },
  { arabic: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ", transliteration: "Bismillah ir-Rahman ir-Rahim", english: "In the name of God, the Most Gracious, the Most Merciful", source: "Quran 1:1" }
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// THREE.JS — SPACE JOURNEY (FLY-THROUGH)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05050a, 0.002);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
camera.position.z = 1;

// STARFIELD GENERATION
const starsCount = 8000;
const positions = new Float32Array(starsCount * 3);
const colors = new Float32Array(starsCount * 3);
const colorPalette = [
  new THREE.Color(0xffffff), // White
  new THREE.Color(0xdbe9ff), // Blue-white
  new THREE.Color(0xfff5e6), // Yellow-white
  new THREE.Color(0xfccfec), // Soft Pink
  new THREE.Color(0x9db4ff)  // Light Blue
];

for (let i = 0; i < starsCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 1000;     // X
  positions[i * 3 + 1] = (Math.random() - 0.5) * 1000; // Y
  positions[i * 3 + 2] = Math.random() * 1000;         // Z
  
  const chosenColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];
  colors[i * 3] = chosenColor.r;
  colors[i * 3 + 1] = chosenColor.g;
  colors[i * 3 + 2] = chosenColor.b;
}

const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
starGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const starMat = new THREE.PointsMaterial({
  size: 1.5,
  vertexColors: true,
  transparent: true,
  opacity: 0.8,
  sizeAttenuation: true
});

const starField = new THREE.Points(starGeo, starMat);
scene.add(starField);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AZKAR LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DURATION = 10000;
let currentIdx = 0, startTime = Date.now(), paused = false, pausedAt = 0, currentEl = null;

function showAzkar(idx) {
  const z = AZKAR[idx];
  const old = currentEl;
  if (old) { 
    old.classList.remove('active'); 
    old.classList.add('exit'); 
    setTimeout(() => old.remove(), 1200); 
  }
  
  const el = document.createElement('div');
  el.className = 'azkar-slide';
  el.innerHTML = `
    <div class="arabic">${z.arabic}</div>
    <div class="divider"></div>
    <div class="transliteration">${z.transliteration}</div>
    <div class="english">${z.english}</div>
    <div class="source">${z.source}</div>
  `;
  document.getElementById('text-wrap').appendChild(el);
  setTimeout(() => el.classList.add('active'), 50);
  currentEl = el;
  document.getElementById('counter').textContent = `${idx + 1} / ${AZKAR.length}`;
}

function advance() {
  currentIdx = (currentIdx + 1) % AZKAR.length;
  startTime = Date.now();
  showAzkar(currentIdx);
}

function togglePause() {
  paused = !paused;
  const pill = document.getElementById('paused-pill');
  if (paused) {
    pausedAt = Date.now() - startTime;
    document.getElementById('icon-pause').style.display = 'none';
    document.getElementById('icon-play').style.display = 'block';
    pill.style.opacity = '1';
  } else {
    startTime = Date.now() - pausedAt;
    document.getElementById('icon-pause').style.display = 'block';
    document.getElementById('icon-play').style.display = 'none';
    pill.style.opacity = '0';
  }
}

document.getElementById('card').addEventListener('click', () => { if(!paused) advance(); });
document.getElementById('pause-btn').addEventListener('click', (e) => { e.stopPropagation(); togglePause(); });

showAzkar(0);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ANIMATION LOOP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function animate() {
  requestAnimationFrame(animate);
  const now = Date.now();
  
  // FLY-THROUGH MOVEMENT
  const positions = starField.geometry.attributes.position.array;
  for (let i = 0; i < starsCount; i++) {
    positions[i * 3 + 2] -= 0.8; // Move stars toward camera (speed)
    
    // Reset star to back if it passes the camera
    if (positions[i * 3 + 2] < 0) {
      positions[i * 3 + 2] = 1000;
      positions[i * 3] = (Math.random() - 0.5) * 1000;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 1000;
    }
  }
  starField.geometry.attributes.position.needsUpdate = true;
  starField.rotation.z += 0.0005; // Subtle tilt rotation

  // PROGRESS BAR LOGIC
  if (!paused) {
    const elapsed = now - startTime;
    const p = Math.max(0, 1 - (elapsed / DURATION));
    document.getElementById('progress-bar').style.transform = `scaleX(${p})`;
    if (elapsed >= DURATION) advance();
  }
  
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
